syntax = "proto3";

package amida.productdelta.v1;

message FeedEnvelope {
  uint32 schema_version = 1;
  string stream = 2;
  string store_code = 3;
  uint64 from_event_id = 4;
  uint64 to_event_id = 5;
  bool has_more = 6;
  bool cursor_expired = 7;
  repeated FeedItem items = 8;
  repeated Diagnostic diagnostics = 9;
}

message FeedItem {
  uint64 event_id = 1;
  string stream = 2;
  string origin_stream = 3;
  uint64 product_id = 4;
  string sku = 5;
  string store_code = 6;
  EventType event_type = 7;
  repeated string changed_fields = 8;
  string source_updated_at = 9;
  string emitted_at = 10;
  uint32 payload_version = 11;
  string payload_hash = 12;
  ProductState payload = 13;
}

message SnapshotEnvelope {
  uint32 schema_version = 1;
  string stream = 2;
  string store_code = 3;
  uint64 from_state_id = 4;
  uint64 to_state_id = 5;
  bool has_more = 6;
  uint64 changes_highwater_event_id = 7;
  repeated SnapshotItem items = 8;
  repeated Diagnostic diagnostics = 9;
}

message SnapshotItem {
  uint64 state_id = 1;
  uint64 product_id = 2;
  string sku = 3;
  string stream = 4;
  string store_code = 5;
  string updated_at = 6;
  string state_hash = 7;
  ProductState payload = 8;
}

message ProductState {
  bool enabled = 1;
  repeated AttributeValue attributes = 2;
  CategoryState category = 3;
  PriceState price = 4;
  AvailabilityState availability = 5;
  bool deleted = 6;
}

message AttributeValue {
  string code = 1;
  ValueKind kind = 2;
  bool is_null = 3;
  string string_value = 4;
  int64 int_value = 5;
  double float_value = 6;
  bool bool_value = 7;
  repeated string list_values = 8;
  repeated string labels = 9;
}

message CategoryState {
  repeated CategoryAssignment categories = 1;
  repeated uint64 added_category_ids = 2;
  repeated uint64 removed_category_ids = 3;
}

message CategoryAssignment {
  uint64 category_id = 1;
  sint32 position = 2;
}

message PriceState {
  double price = 1;
  double special_price = 2;
  string special_from_date = 3;
  string special_to_date = 4;
  repeated TierPrice tier_prices = 5;
  repeated GroupPrice group_prices = 6;
  string currency_code = 7;
}

message TierPrice {
  string customer_group = 1;
  double qty = 2;
  double value = 3;
}

message GroupPrice {
  string customer_group = 1;
  double value = 2;
}

message AvailabilityState {
  bool is_in_stock = 1;
  bool is_salable = 2;
  double qty = 3;
  bool manage_stock = 4;
  int32 backorders = 5;
  string stock_status = 6;
}

message Diagnostic {
  string code = 1;
  string message = 2;
  uint64 event_id = 3;
}

enum EventType {
  EVENT_TYPE_UNSPECIFIED = 0;
  UPSERT_PARTIAL = 1;
  UPSERT_FULL = 2;
  STATUS_ONLY = 3;
  CATEGORY_FULL = 4;
  TOMBSTONE = 5;
  SNAPSHOT_ITEM = 6;
}

enum ValueKind {
  VALUE_KIND_UNSPECIFIED = 0;
  STRING = 1;
  INT = 2;
  FLOAT = 3;
  BOOL = 4;
  DATE = 5;
  DATETIME = 6;
  SELECT = 7;
  MULTISELECT = 8;
  TEXT = 9;
}
