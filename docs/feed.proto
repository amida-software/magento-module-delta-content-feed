syntax = "proto3";
package ordo.vacui.magento.deltafeed;

message FeedEnvelope {
  string module_version = 1;
  string mode = 2;
  string stream = 3;
  uint64 next_cursor = 4;
  bool has_more = 5;
  uint32 item_count = 6;
  repeated FeedRecord items = 7;
  uint64 generated_at_unix = 8;
}

message FeedRecord {
  uint64 product_id = 1;
  uint32 store_id = 2;
  string sku = 3;
  string op = 4;
  bool is_enabled = 5;
  repeated Attribute attributes = 6;
  repeated Category categories = 7;
  uint64 event_id = 8;
  string updated_at = 9;
}

message Attribute {
  string code = 1;
  string value = 2;
}

message Category {
  uint64 category_id = 1;
  string name = 2;
  string path = 3;
  uint32 position = 4;
}
